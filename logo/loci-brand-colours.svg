<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" font-family="Inter, Arial, sans-serif">
  <rect width="600" height="320" fill="#080C16" rx="12"/>

  <!-- Title -->
  <text x="28" y="40" fill="#EDEDED" font-size="16" font-weight="600">LOCI Brand Colours</text>
  <text x="28" y="58" fill="#8A8F9E" font-size="10">v1.0.0 · namespace: loci</text>

  <!-- Swatch 1: Dark BG -->
  <rect x="28" y="78" width="80" height="80" rx="8" fill="#080C16" stroke="#282828" stroke-width="1"/>
  <text x="68" y="178" fill="#8A8F9E" font-size="9" text-anchor="middle">Background</text>
  <text x="68" y="190" fill="#EDEDED" font-size="10" text-anchor="middle" font-weight="600">#080C16</text>

  <!-- Swatch 2: Teal -->
  <rect x="128" y="78" width="80" height="80" rx="8" fill="#14B8A6"/>
  <text x="168" y="178" fill="#8A8F9E" font-size="9" text-anchor="middle">Teal (Primary)</text>
  <text x="168" y="190" fill="#EDEDED" font-size="10" text-anchor="middle" font-weight="600">#14B8A6</text>

  <!-- Swatch 3: Blue -->
  <rect x="228" y="78" width="80" height="80" rx="8" fill="#37A7E7"/>
  <text x="268" y="178" fill="#8A8F9E" font-size="9" text-anchor="middle">Blue (Accent)</text>
  <text x="268" y="190" fill="#EDEDED" font-size="10" text-anchor="middle" font-weight="600">#37A7E7</text>

  <!-- Swatch 4: Text -->
  <rect x="328" y="78" width="80" height="80" rx="8" fill="#EDEDED"/>
  <text x="368" y="178" fill="#8A8F9E" font-size="9" text-anchor="middle">Light Text</text>
  <text x="368" y="190" fill="#EDEDED" font-size="10" text-anchor="middle" font-weight="600">#EDEDED</text>

  <!-- Swatch 5: Lines -->
  <rect x="428" y="78" width="80" height="80" rx="8" fill="#282828" stroke="#282828" stroke-width="1"/>
  <text x="468" y="178" fill="#8A8F9E" font-size="9" text-anchor="middle">Lines / Borders</text>
  <text x="468" y="190" fill="#EDEDED" font-size="10" text-anchor="middle" font-weight="600">#282828</text>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="33%"  stop-color="#34d399"/>
      <stop offset="66%"  stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect x="28" y="220" width="544" height="28" rx="6" fill="url(#grad)"/>
  <text x="300" y="239" fill="#080C16" font-size="10" text-anchor="middle" font-weight="700">Gradient: #4ade80 → #34d399 → #2dd4bf → #22d3ee</text>

  <!-- Font note -->
  <text x="28" y="284" fill="#8A8F9E" font-size="10">Typography: Inter · Weights: 400 regular · 500 medium · 600 bold</text>
  <text x="28" y="300" fill="#8A8F9E" font-size="10">Muted text: #8A8F9E · Card bg: #0F1523</text>
</svg>
